<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Jackpot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg"></div>

  <main class="wrap">
    <header class="hero">
      <div>
        <p class="eyebrow">LIVE JACKPOT UPDATE</p>
        <h1>Queenco - Jackpot List</h1>
        <p class="sub">
          Live jackpot values streamed.
        </p>
      </div>
	  
      <div class="hero-status">
        <div class="status-card">
          <span class="status-dot" id="statusDot"></span>
          <div>
            <div class="status-label">Connection Status</div>
            <div class="status-value" id="connectionStatus">Waiting for data...</div>
          </div>
        </div>
        <div class="status-card">
          <div>
            <div class="status-label">Last Updated</div>
            <div class="status-value" id="lastUpdated">--</div>
          </div>
        </div>
      </div>
    </header>
	
<div class="view-switch">
  <button id="btnCurrentJackpot" class="view-btn active" type="button">Current Jackpot</button>
  <button id="btnLastJackpotHits" class="view-btn" type="button">Last Jackpot Hits</button>
</div>

    <section class="meters-grid" id="metersGrid"></section>
  </main>

  <template id="meterCardTemplate">
    <article class="meter-card">
      <div class="meter-top">
        <div>
          <div class="meter-name"></div>
          <div class="meter-id"></div>
        </div>
        <div class="meter-badge">LIVE</div>
      </div>
      <div class="meter-value">0.00</div>
      <div class="meter-footer">
        <span class="meter-raw-label"></span>
        <span class="meter-raw-value">0</span>
      </div>
    </article>
  </template>
<div id="hitOverlay" class="hit-overlay hidden">
  <div class="hit-popup">
    <div class="hit-badge">JACKPOT HIT</div>
    <div id="hitGameName" class="hit-game-name">Game Name</div>
    <div id="hitLevelName" class="hit-level-name">Level</div>
    <div id="hitAmount" class="hit-amount">0.00</div>
    <div id="hitDateTime" class="hit-datetime">--</div>
  </div>
</div>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
