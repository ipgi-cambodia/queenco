<div class="jackpot-section reveal-item">
  <header class="jackpot-hero">
    <div>
      <p class="jackpot-eyebrow" data-i18n="jackpot.eyebrow">LIVE JACKPOT UPDATE</p>
      <h1 data-i18n="jackpot.title">Queenco Jackpot Live</h1>
      <p class="jackpot-sub" data-i18n="jackpot.subtitle">Live jackpot values and last jackpot hits streamed from Queenco.</p>
    </div>

    <div class="jackpot-hero-status">
      <div class="jackpot-status-card">
        <span class="status-dot" id="statusDot"></span>
        <div>
          <div class="jackpot-status-label" data-i18n="jackpot.connectionStatus">Connection Status</div>
          <div class="jackpot-status-value" id="connectionStatus">Waiting for data...</div>
        </div>
      </div>
      <div class="jackpot-status-card">
        <div>
          <div class="jackpot-status-label" data-i18n="jackpot.lastUpdated">Last Updated</div>
          <div class="jackpot-status-value" id="lastUpdated">--</div>
        </div>
      </div>
    </div>
  </header>

  <div class="view-switch">
    <button id="btnCurrentJackpot" class="view-btn active" type="button" data-i18n="jackpot.currentJackpot">Current Jackpot</button>
    <button id="btnLastJackpotHits" class="view-btn" type="button" data-i18n="jackpot.lastHits">Last Jackpot Hits</button>
  </div>

  <section class="meters-grid" id="metersGrid" aria-label="Live Jackpot Meters"></section>
</div>

<template id="meterCardTemplate">
  <article class="meter-card">
    <div class="meter-top">
      <div>
        <div class="meter-name"></div>
        <div class="meter-id"></div>
      </div>
      <div class="meter-badge">LIVE</div>
    </div>
    <div class="meter-value">0.00</div>
    <div class="meter-footer">
      <span class="meter-raw-label"></span>
      <span class="meter-raw-value">0</span>
    </div>
  </article>
</template>

<div id="hitOverlay" class="hit-overlay hidden">
  <div class="hit-popup">
    <div class="hit-badge" data-i18n="jackpot.hitBadge">JACKPOT HIT</div>
    <div id="hitGameName" class="hit-game-name">Game Name</div>
    <div id="hitLevelName" class="hit-level-name">Level</div>
    <div id="hitAmount" class="hit-amount">0.00</div>
    <div id="hitDateTime" class="hit-datetime">--</div>
  </div>
</div>
